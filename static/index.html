<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nurikabe Solver</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="toolbar">
  <h1>Nurikabe Solver</h1>
  <button class="toolbar-btn" id="btn-load">Load File</button>
  <button class="toolbar-btn" id="btn-paste">Paste Puzzle</button>
</div>

<div id="main">
  <div id="canvas-wrap">
    <canvas id="grid" width="520" height="520"></canvas>
  </div>

  <div id="sidebar">
    <div id="info">No puzzle loaded</div>

    <hr class="divider">
    <div class="section-label">Solve</div>

    <button class="btn btn-primary" id="btn-solve">&#9654; Auto-Solve <kbd>Space</kbd></button>
    <button class="btn" id="btn-step">&#9197; Step-by-Step <kbd>S</kbd></button>
    <button class="btn" id="btn-hint">&#128161; Hint <kbd>H</kbd></button>
    <button class="btn" id="btn-reset">&#8635; Reset <kbd>R</kbd></button>

    <!-- VCR step controls -->
    <div id="vcr-controls" style="display:none">
      <div id="step-counter">Step 0 / 0</div>
      <div id="step-rule">&nbsp;</div>
      <div class="vcr-row">
        <button class="vcr-btn" id="btn-to-start" title="To start">&#8676;</button>
        <button class="vcr-btn" id="btn-prev" title="Prev [&#8592;]">&#9664;</button>
        <button class="vcr-btn" id="btn-play" title="Play/Pause">&#9654;</button>
        <button class="vcr-btn" id="btn-next" title="Next [&#8594;]">&#9655;</button>
        <button class="vcr-btn" id="btn-to-end" title="To end">&#8677;</button>
      </div>
      <div class="speed-row">
        Speed <input type="range" id="speed" min="1" max="10" value="5">
      </div>
    </div>

    <hr class="divider">
    <div class="section-label">Manual</div>

    <div class="tool-row">
      <button class="tool-btn active" data-tool="black">Water <kbd>1</kbd></button>
      <button class="tool-btn" data-tool="white">Island <kbd>2</kbd></button>
      <button class="tool-btn" data-tool="unknown">Erase <kbd>3</kbd></button>
    </div>
    <button class="btn" id="btn-check">&#10004; Check Solution</button>

    <hr class="divider">
    <div id="timer">Timer: &mdash;</div>

    <hr class="divider">
    <div class="section-label">Status</div>
    <div id="status">Ready</div>

    <hr class="divider">
    <div class="section-label">Legend</div>
    <div class="legend">
      <div class="legend-item"><div class="swatch" style="background:#1a2d4a"></div>Water</div>
      <div class="legend-item"><div class="swatch" style="background:#fef9f0"></div>Island</div>
      <div class="legend-item"><div class="swatch" style="background:#1c2535"></div>Unknown</div>
      <div class="legend-item"><div class="swatch" style="background:#fbbf24"></div>Hint</div>
      <div class="legend-item"><div class="swatch" style="background:#f87171"></div>Conflict</div>
    </div>
  </div>
</div>

<!-- Paste modal -->
<div id="paste-modal">
  <div id="paste-box">
    <h2>Paste puzzle</h2>
    <textarea id="paste-text" placeholder="Numbers separated by spaces, 0 = empty&#10;&#10;2 0 0 3&#10;0 0 0 0&#10;0 3 0 0&#10;0 0 0 2"></textarea>
    <div class="paste-btns">
      <button id="btn-paste-cancel">Cancel</button>
      <button id="btn-paste-ok">Load</button>
    </div>
  </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".txt" style="display:none">

<script type="module" src="/static/js/main.js"></script>
</body>
</html>
